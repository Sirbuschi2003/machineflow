services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auftragsverwaltung
      POSTGRES_USER: auftragsverwaltung
      POSTGRES_PASSWORD: auftragsverwaltung_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auftragsverwaltung"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/sirbuschi2003/auftragsverwaltung-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://auftragsverwaltung:auftragsverwaltung_secret@db:5432/auftragsverwaltung
      SESSION_SECRET: super_secret_session_key_change_in_production
      PORT: 3002
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5174
    ports:
      - "3002:3002"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/sirbuschi2003/auftragsverwaltung-frontend:latest
    restart: unless-stopped
    environment:
      VITE_API_TARGET: http://backend:3002
    ports:
      - "5174:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
